name: Sync temple photos

# Full-mirror reconciliation: Google Drive inbox -> R2 (or local-output,
# pre-Phase-2). Runs on a timer and can also be triggered manually. See
# README.md's "Photo sync pipeline" section for setup.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-photos
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Skip (Google Drive not configured yet)
        if: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID == '' }}
        run: echo "GOOGLE_DRIVE_ROOT_FOLDER_ID secret isn't set yet — see README.md's Photo sync pipeline setup. Skipping this run."

      - name: Run Drive -> R2 sync
        if: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: npm run sync:drive
